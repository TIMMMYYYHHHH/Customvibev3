<div class="quote-modal-overlay" id="summary-modal-overlay">
  <div class="quote-modal-card" id="summary-modal-content-card">
    <button type="button" class="quote-modal-close" id="summary-modal-close-btn" aria-label="Close summary modal"></button>

    <div class="quote-modal-header">
      <div class="quote-modal-header-icon" id="summary-modal-header-icon"></div>
      <div>
        <h3>Design Summary</h3>
        <p>Verify your custom selections before providing shipping instructions.</p>
      </div>
    </div>

    <div class="quote-modal-body" id="summary-modal-body"></div>

    <div class="quote-modal-footer">
      <div style="display:flex; align-items:center; gap:0.375rem; font-size:0.75rem; color:#059669; font-weight:700;" id="summary-modal-secure-note">
        <span id="summary-modal-secure-icon"></span>
        <span>Free Image Proportions Quality Check</span>
      </div>

      <div style="display:flex; align-items:center; gap:0.75rem; width:100%;" id="summary-modal-actions">
        <button type="button" class="btn btn-secondary" id="summary-modal-cancel-btn" style="flex:1;">Keep Editing</button>
        <button type="button" class="btn btn-primary" id="summary-modal-proceed-btn" style="flex:1;">
          Confirm and Proceed
          <span id="summary-modal-proceed-icon"></span>
        </button>
      </div>
    </div>
  </div>
</div>
